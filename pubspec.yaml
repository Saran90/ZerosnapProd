name: app
description: "Zerosnap - Guest Management & FRRO Registration"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.1

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # State management
  flutter_bloc: ^8.1.6
  equatable: ^2.0.5

  # Dependency injection
  get_it: ^8.0.2

  # Navigation
  go_router: ^14.6.2

  # Functional programming (Either, Option)
  dartz: ^0.10.1

  # Local storage
  shared_preferences: ^2.3.3

  # SVG support
  flutter_svg: ^2.0.10+1

  # MRZ Scanner
  mrzscanner_flutter: ^1.0.0

  # QR/Barcode scanner for Aadhar, PAN, Voters ID
  mobile_scanner: ^5.2.3

  # HTTP client
  http: ^1.2.2

  # Image picker
  image_picker: ^1.1.2

  # Image cropper
  image_cropper: 12.2.1

  # WebView
  webview_flutter: ^4.10.0

  # App / system settings
  app_settings: ^5.1.1

  # OCR for CAPTCHA reading
  google_mlkit_text_recognition: ^0.13.1

  # Utils
  intl: ^0.19.0
  uuid: ^4.5.1
  crop_your_image: ^2.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/svg/
